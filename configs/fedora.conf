# Fedora configuration
DISTRO_NAME="fedora"
DISTRO_LABEL="Fedora Linux"
DISTRO_FAMILY="redhat"
DISTRO_SUITE=""                       # Uses version number
DISTRO_VERSION="43"
HOSTNAME_DEFAULT="fedora-portable"
MNT_DEFAULT="/mnt/fedora"

# Bootstrap method
BOOTSTRAP_METHOD="dnf"
BOOTSTRAP_ARCH="x86_64"

# Packages — Phase 5b (kernel + ZFS + boot)
PKGS_KERNEL="kernel kernel-devel kernel-headers"
PKGS_ZFS="zfs zfs-dracut"            # From ZFS on Linux repo
PKGS_BOOT="dosfstools grub2-efi-x64 grub2-efi-x64-modules shim-x64 sbsigntools"
PKGS_TIME="systemd"

# Packages — Phase 5c (desktop + tools)
PKGS_NETWORK="NetworkManager wireless-tools wpa_supplicant"
PKGS_FIRMWARE="linux-firmware"
PKGS_DESKTOP="@kde-desktop-environment"
PKGS_DISTRO_TOOLS=""
PKGS_EXTRA="openssh-server sudo vim-enhanced curl wget git htop tmux efibootmgr pciutils usbutils lsof net-tools bash-completion plymouth"

# Disk layout
ESP_SIZE="512M"
BOOT_POOL_SIZE="1G"
ROOT_POOL_SIZE="65536M"
SWAP_SIZE="4G"

# Disk identifiers
DISK_WWN=""
DISK_ATA=""
DISK_USB=""
