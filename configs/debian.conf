# Debian Stable configuration
DISTRO_NAME="debian"
DISTRO_LABEL="Debian"
DISTRO_FAMILY="debian"
DISTRO_SUITE="trixie"
DISTRO_MIRROR="https://deb.debian.org/debian"
HOSTNAME_DEFAULT="debian-portable"
MNT_DEFAULT="/mnt/debian"

# Bootstrap method
BOOTSTRAP_METHOD="debootstrap"
BOOTSTRAP_ARCH="amd64"

# APT sources
APT_COMPONENTS="main contrib non-free non-free-firmware"

# Packages — Phase 5b
PKGS_KERNEL="linux-headers-amd64 linux-image-amd64"
PKGS_ZFS="zfs-dkms zfsutils-linux zfs-initramfs"
PKGS_BOOT="dosfstools grub-efi-amd64 grub-efi-amd64-signed shim-signed sbsigntool mokutil"
PKGS_TIME="systemd-timesyncd"

# Packages — Phase 5c
PKGS_NETWORK="network-manager wireless-tools wpasupplicant"
PKGS_FIRMWARE="firmware-linux firmware-linux-nonfree firmware-misc-nonfree firmware-iwlwifi firmware-realtek firmware-atheros"
PKGS_DESKTOP="task-kde-desktop"
PKGS_DISTRO_TOOLS=""
PKGS_EXTRA="openssh-server sudo vim curl wget git htop tmux efibootmgr pciutils usbutils lsof net-tools bash-completion plymouth plymouth-themes"

# Disk layout
ESP_SIZE="512M"
BOOT_POOL_SIZE="1G"
ROOT_POOL_SIZE="65536M"
SWAP_SIZE="4G"

# Disk identifiers (override per-machine)
DISK_WWN=""
DISK_ATA=""
DISK_USB=""
