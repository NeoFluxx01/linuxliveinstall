# Kali Linux configuration
DISTRO_NAME="kali"
DISTRO_LABEL="Kali Linux"
DISTRO_FAMILY="debian"               # debian | redhat | arch
DISTRO_SUITE="kali-rolling"
DISTRO_MIRROR="https://http.kali.org/kali"
HOSTNAME_DEFAULT="kali-portable"
MNT_DEFAULT="/mnt/kali"

# Bootstrap method
BOOTSTRAP_METHOD="debootstrap"        # debootstrap | dnf | pacstrap
BOOTSTRAP_ARCH="amd64"

# APT sources
APT_COMPONENTS="main contrib non-free non-free-firmware"

# Packages — Phase 5b (kernel + ZFS + boot)
PKGS_KERNEL="linux-headers-amd64 linux-image-amd64"
PKGS_ZFS="zfs-initramfs zfsutils-linux"
PKGS_BOOT="dosfstools grub-efi-amd64 grub-efi-amd64-signed shim-signed sbsigntool mokutil"
PKGS_TIME="systemd-timesyncd"

# Packages — Phase 5c (desktop + tools)
PKGS_NETWORK="network-manager wireless-tools wpasupplicant"
PKGS_FIRMWARE="firmware-linux firmware-linux-nonfree firmware-misc-nonfree firmware-iwlwifi firmware-realtek firmware-atheros"
PKGS_DESKTOP="kali-desktop-kde"
PKGS_DISTRO_TOOLS="kali-linux-default kali-tools-top10"
PKGS_EXTRA="openssh-server sudo vim curl wget git htop tmux efibootmgr pciutils usbutils lsof net-tools bash-completion plymouth plymouth-themes"

# Disk layout
ESP_SIZE="512M"
BOOT_POOL_SIZE="1G"
ROOT_POOL_SIZE="65536M"
SWAP_SIZE="4G"

# Disk identifiers (override per-machine)
DISK_WWN="/dev/disk/by-id/wwn-0x5002538d006b1ef3"
DISK_ATA="/dev/disk/by-id/ata-SAMSUNG_MZNLN128HAHQ-000H1_S3T8NE1K664564"
DISK_USB="/dev/disk/by-id/usb-SAMSUNG_MZNLN128HAHQ-000_012345678999-0:0"
