# Windows To Go configuration
DISTRO_NAME="windows"
DISTRO_LABEL="Windows 11 To Go"
DISTRO_FAMILY="windows"
HOSTNAME_DEFAULT="win-portable"

# Windows ISO source (place in project directory)
# Download from: https://www.microsoft.com/software-download/windows11
WINDOWS_ISO=""                        # Auto-detected from *.iso files

# Partition layout for Windows To Go
# Part 1: ESP (FAT32) — Windows Boot Manager + BCD
# Part 2: MSR (Microsoft Reserved) — required by Windows
# Part 3: NTFS — Windows system partition
ESP_SIZE="512M"
MSR_SIZE="128M"
WINDOWS_SIZE="65536M"                  # 64 GiB

# SAN (Storage Area Network) Policy
# Controls whether Windows automounts internal drives on the host machine.
#
#   1 = Online All      (default desktop — mounts everything, DANGEROUS for portable)
#   2 = Offline Shared  (offline SAN disks only)
#   3 = Offline Internal (offline internal disks — used by Windows To Go)
#   4 = Offline All     (offline ALL disks except the boot disk — SAFEST)
#
# Rufus uses policy 4 when creating Windows To Go drives.
# This prevents the portable Windows from seeing or writing to the
# internal drives of whatever machine it boots on.
SAN_POLICY=4

# Windows To Go registry tweaks
# These are applied to the offline Windows image after WIM extraction:
#
# - SanPolicy=4: Don't automount internal drives (see above)
# - PortableOperatingSystem=1: Tell Windows it's running as To Go
#   (enables some portable-friendly behaviors like skip OOBE hardware pages)
# - Disable hibernate: Not useful on portable (different hardware each boot)
# - Disable fast startup: Causes issues when moving between machines

# Secure Boot
# Windows bootloader (bootmgfw.efi) is signed by Microsoft directly.
# No shim needed — it's the most natively Secure Boot compatible OS.
# The boot chain is:
#   UEFI firmware → bootmgfw.efi (MS-signed) → winload.efi → ntoskrnl.exe

# Disk identifiers (override per-machine)
DISK_WWN=""
DISK_ATA=""
DISK_USB=""
