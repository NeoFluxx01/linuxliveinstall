# Arch Linux configuration
DISTRO_NAME="arch"
DISTRO_LABEL="Arch Linux"
DISTRO_FAMILY="arch"
DISTRO_SUITE=""                       # Rolling release
DISTRO_MIRROR=""                      # Uses pacstrap defaults
HOSTNAME_DEFAULT="arch-portable"
MNT_DEFAULT="/mnt/arch"

# Bootstrap method
BOOTSTRAP_METHOD="pacstrap"
BOOTSTRAP_ARCH="x86_64"

# APT/pacman sources
APT_COMPONENTS=""                     # Not applicable for Arch

# Packages — Phase 5b (kernel + ZFS + boot)
# Note: ZFS on Arch requires the archzfs repo or DKMS build
PKGS_KERNEL="linux linux-headers"
PKGS_ZFS="zfs-utils zfs-dkms"        # From archzfs repo
PKGS_BOOT="dosfstools grub efibootmgr sbsigntools"
PKGS_TIME="systemd"                   # timesyncd is part of systemd on Arch

# Packages — Shim: Arch doesn't have shim-signed in official repos.
# Options: shim-signed from AUR, or use PreLoader from the AUR.
# The installer will need to handle this specially.
PKGS_SECUREBOOT_AUR="shim-signed"

# Packages — Phase 5c (desktop + tools)
PKGS_NETWORK="networkmanager wireless_tools wpa_supplicant"
PKGS_FIRMWARE="linux-firmware"
PKGS_DESKTOP="plasma-meta sddm"
PKGS_DISTRO_TOOLS=""
PKGS_EXTRA="openssh sudo vim curl wget git htop tmux pciutils usbutils lsof net-tools bash-completion plymouth"

# Disk layout
ESP_SIZE="512M"
BOOT_POOL_SIZE="1G"
ROOT_POOL_SIZE="65536M"
SWAP_SIZE="4G"

# Disk identifiers
DISK_WWN=""
DISK_ATA=""
DISK_USB=""
